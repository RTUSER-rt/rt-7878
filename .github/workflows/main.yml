name: Daily Job Update

on:
  schedule:
    - cron: '0 0 * * *' # 每天早上 8 點自動執行 (UTC+0 換算)
  workflow_dispatch:      # 允許你在 GitHub 介面手動點擊執行

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Run Scraper
        run: python scraper.py

      - name: Commit and Push if Changed
        run: |
          git config --global user.name "RT-Bot"
          git config --global user.email "bot@github.com"
          git add jobs.json
          git commit -m "自動更新職缺列表: $(date +'%Y-%m-%d %H:%M')" || exit 0
          git push
