<!-- 在 JS 渲染部分修改模板 -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <!-- 每一張卡片的結構 -->
    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col justify-between">
        <div>
            <div class="flex items-center justify-between mb-3">
                <!-- 區域位置標籤 -->
                <span class="bg-blue-600 text-white text-sm font-bold px-3 py-1 rounded-full">
                    <i class="fa-solid fa-location-dot mr-1"></i> ${job.city}
                </span>
                <span class="text-xs text-gray-400">${job.location}</span>
            </div>
            <h2 class="text-lg font-bold text-gray-800 mb-4">${job.hospital}</h2>
        </div>
        
        <div class="flex items-end justify-between border-t pt-4">
            <div>
                <p class="text-xs text-gray-500">預估薪資</p>
                <!-- 薪資大字顯示 -->
                <p class="text-xl font-extrabold text-green-600">${job.salary}</p>
            </div>
            <a href="${job.link}" target="_blank" class="bg-gray-800 text-white px-4 py-2 rounded-lg text-sm">應徵</a>
        </div>
    </div>
</div>
