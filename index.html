<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>應屆 RT 職缺導航</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    <nav class="bg-slate-900 text-white p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="font-black text-xl tracking-tighter">RT JOB LINK</h1>
            <p id="update-time" class="text-xs opacity-60">更新中...</p>
        </div>
    </nav>

    <main class="container mx-auto p-4 max-w-5xl">
        <div id="job-list" class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-4">
            <!-- 資料會在這裡載入 -->
        </div>
    </main>

    <script>
    async function renderJobs() {
        try {
            const response = await fetch('./jobs.json');
            const data = await response.json();
            document.getElementById('update-time').innerText = `最後更新：${data.last_update}`;
            const container = document.getElementById('job-list');
            
            // 注意：這裡必須使用反引號 ` 才能讓 ${ } 正常運作
            container.innerHTML = data.jobs.map(job => `
                <div class="bg-white rounded-3xl p-6 shadow-sm border border-gray-100 hover:shadow-lg transition-all">
                    <div class="flex justify-between items-center mb-4">
                        <span class="bg-blue-600 text-white font-bold px-3 py-1 rounded-full text-xs italic">
                            <i class="fa-solid fa-map-pin mr-1"></i> ${job.city}
                        </span>
                        <span class="text-[10px] text-gray-400 bg-gray-50 px-2 py-1 rounded">${job.source} 來源</span>
                    </div>
                    
                    <h2 class="text-xl font-extrabold text-slate-800 mb-2">${job.hospital}</h2>
                    
                    <div class="bg-emerald-50 p-4 rounded-2xl mb-4">
                        <p class="text-[10px] text-emerald-600 font-black uppercase tracking-widest mb-1">應屆薪資參考</p>
                        <p class="text-2xl font-black text-emerald-700 tracking-tight">${job.salary}</p>
                    </div>

                    <div class="border-t border-dashed pt-4">
                        <p class="text-sm text-slate-500 leading-relaxed">
                            <i class="fa-solid fa-comment-dots text-blue-400 mr-2"></i>${job.review}
                        </p>
                    </div>
                    
                    <a href="${job.link}" target="_blank" class="mt-6 block text-center bg-slate-900 text-white font-bold py-4 rounded-2xl hover:bg-blue-600 transition shadow-lg shadow-gray-200">
                        應徵職缺詳情
                    </a>
                </div>
            `).join('');
        } catch (e) {
            document.getElementById('job-list').innerHTML = '<p class="text-center py-20 text-gray-400">職缺資料載入中，請稍後再試...</p>';
        }
    }
    renderJobs();
    </script>
</body>
</html>
