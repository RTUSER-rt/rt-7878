<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RT 即時職缺看板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    <nav class="bg-blue-800 text-white p-4 shadow-md text-center">
        <h1 class="text-xl font-bold">RT 即時職缺資訊站</h1>
        <p class="text-xs opacity-75 mt-1" id="update-time">載入中...</p>
    </nav>

    <div class="container mx-auto p-4 max-w-4xl">
        <div id="job-container" class="space-y-4">
            <p class="text-center text-gray-500 py-10">職缺資料讀取中...</p>
        </div>
    </div>

    <script>
        async function loadJobs() {
            try {
                // 讀取由 Actions 產生的 jobs.json
                const response = await fetch('./jobs.json');
                const data = await response.json();
                
                document.getElementById('update-time').innerText = `最後更新：${data.last_update}`;
                
                const container = document.getElementById('job-container');
                container.innerHTML = ''; // 清空載入中文字

                data.jobs.forEach(job => {
                    const card = `
                        <div class="bg-white p-5 rounded-lg shadow border-l-4 border-blue-500 hover:shadow-md transition">
                            <div class="flex justify-between items-start">
                                <div>
                                    <h2 class="text-lg font-bold text-gray-800">${job.hospital}</h2>
                                    <p class="text-blue-600 font-medium">${job.title}</p>
                                    <div class="flex gap-2 mt-2">
                                        <span class="text-xs bg-gray-100 px-2 py-1 rounded text-gray-600">${job.location}</span>
                                        <span class="text-xs bg-green-50 px-2 py-1 rounded text-green-700">${job.salary}</span>
                                    </div>
                                </div>
                                <a href="${job.link}" target="_blank" class="bg-blue-600 text-white px-4 py-2 rounded text-sm hover:bg-blue-700">查看</a>
                            </div>
                        </div>
                    `;
                    container.innerHTML += card;
                });
            } catch (e) {
                document.getElementById('job-container').innerHTML = '<p class="text-center text-red-500">暫無職缺資料，請稍後再試</p>';
            }
        }
        loadJobs();
    </script>
</body>
</html>
