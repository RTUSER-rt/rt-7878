<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RT 職缺全台導航</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
  .city-btn.active { background-color: #2563eb; color: white; border-color: #2563eb; }
  .job-card { transition: all 0.3s ease; }
  .source-104 { background-color: #dbeafe; color: #1d4ed8; }
  .source-1111 { background-color: #dcfce7; color: #15803d; }
</style>
</head>
<body class="bg-slate-50 text-slate-900">

<nav class="bg-slate-900 text-white p-4 sticky top-0 z-50 shadow-xl">
  <div class="container mx-auto flex justify-between items-center">
    <div>
      <h1 class="font-black text-xl tracking-tight">RT JOB TAIWAN</h1>
      <p id="update-time" class="text-[10px] opacity-50">載入中...</p>
    </div>
    <div id="status-tag" class="text-xs bg-blue-500/20 text-blue-400 px-3 py-1 rounded-full border border-blue-500/30">
      請選擇縣市
    </div>
  </div>
</nav>

<main class="container mx-auto p-4 max-w-6xl">
  <!-- 縣市選擇區 -->
  <div class="bg-white p-6 rounded-3xl shadow-sm mb-8 border border-slate-200">
    <h3 class="text-xs font-bold text-slate-400 mb-4 uppercase tracking-widest">區域篩選</h3>
    <div class="flex flex-wrap gap-2">
      <button onclick="filterCity('全部', this)" class="city-btn border border-slate-200 px-4 py-2 rounded-xl text-sm font-bold">全部</button>
      <button onclick="filterCity('台北', this)" class="city-btn border border-slate-200 px-4 py-2 rounded-xl text-sm">台北/新北</button>
      <button onclick="filterCity('桃園', this)" class="city-btn border border-slate-200 px-4 py-2 rounded-xl text-sm">桃園</button>
      <button onclick="filterCity('新竹', this)" class="city-btn border border-slate-200 px-4 py-2 rounded-xl text-sm">新竹</button>
      <button onclick="filterCity('台中', this)" class="city-btn border border-slate-200 px-4 py-2 rounded-xl text-sm">台中</button>
      <button onclick="filterCity('彰化', this)" class="city-btn border border-slate-200 px-4 py-2 rounded-xl text-sm">彰化</button>
      <button onclick="filterCity('台南', this)" class="city-btn border border-slate-200 px-4 py-2 rounded-xl text-sm">台南</button>
      <button onclick="filterCity('高雄', this)" class="city-btn border border-slate-200 px-4 py-2 rounded-xl text-sm">高雄</button>
      <button onclick="filterCity('屏東', this)" class="city-btn border border-slate-200 px-4 py-2 rounded-xl text-sm">屏東</button>
      <button onclick="filterCity('苗栗', this)" class="city-btn border border-slate-200 px-4 py-2 rounded-xl text-sm">苗栗</button>
      <button onclick="filterCity('雲林', this)" class="city-btn border border-slate-200 px-4 py-2 rounded-xl text-sm">雲林</button>
      <button onclick="filterCity('花蓮', this)" class="city-btn border border-slate-200 px-4 py-2 rounded-xl text-sm">宜蘭/花東</button>
    </div>
  </div>

  <!-- 載入狀態 -->
  <div id="loading-msg" class="text-center py-10 text-slate-400">
    <i class="fa-solid fa-spinner fa-spin text-2xl mb-2"></i>
    <p>職缺載入中...</p>
  </div>

  <!-- 職缺清單 -->
  <div id="job-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 hidden">
  </div>
</main>

<script>
let allJobs = [];

// 從 GitHub raw 直接抓取 jobs.json（解決本地 file:// 跨來源問題）
const JOBS_URL = 'https://raw.githubusercontent.com/RTUSER-rt/rt-7878/main/jobs.json';

async function loadJobs() {
  try {
    const response = await fetch(JOBS_URL + '?t=' + new Date().getTime());
    if (!response.ok) throw new Error('HTTP ' + response.status);
    const data = await response.json();
    allJobs = data.jobs || [];
    document.getElementById('update-time').innerText = '最後更新：' + data.last_update + '　共 ' + allJobs.length + ' 筆職缺';
    document.getElementById('loading-msg').style.display = 'none';
    document.getElementById('job-list').classList.remove('hidden');
    // 預設顯示全部
    filterCity('全部', document.querySelector('.city-btn'));
  } catch (e) {
    document.getElementById('loading-msg').innerHTML = '<p class="text-red-400">資料載入失敗：' + e.message + '<br>請確認 GitHub Actions 是否執行成功。</p>';
    console.error(e);
  }
}

function filterCity(cityName, btn) {
  document.querySelectorAll('.city-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  document.getElementById('status-tag').innerText = cityName === '全部' ? '顯示全部職缺' : '正在查看：' + cityName;

  let filtered;
  if (cityName === '全部') {
    filtered = allJobs;
  } else if (cityName === '台北') {
    filtered = allJobs.filter(job => job.city && (job.city.includes('台北') || job.city.includes('新北')));
  } else if (cityName === '花蓮') {
    filtered = allJobs.filter(job => job.city && (job.city.includes('花蓮') || job.city.includes('宜蘭') || job.city.includes('台東')));
  } else {
    filtered = allJobs.filter(job => job.city && job.city.includes(cityName));
  }

  const container = document.getElementById('job-list');

  if (filtered.length === 0) {
    container.innerHTML = '<div class="col-span-full text-center py-20 text-slate-400 border-2 border-dashed rounded-3xl">目前 ' + cityName + ' 暫無公開職缺</div>';
    return;
  }

  container.innerHTML = filtered.map(function(job) {
    var srcClass = job.source === '104' ? 'source-104' : 'source-1111';
    var dateStr = job.date ? job.date : '';
    var titleStr = job.title || job.hospital || '呼吸治療師';
    return '<div class="job-card bg-white rounded-3xl p-6 shadow-sm border border-slate-100 flex flex-col justify-between hover:shadow-md">' +
      '<div>' +
        '<div class="flex justify-between items-center mb-3">' +
          '<span class="bg-blue-600 text-white font-bold px-3 py-1 rounded-full text-[10px]">' + (job.city || '全台') + '</span>' +
          '<span class="text-[9px] font-bold px-2 py-1 rounded uppercase ' + srcClass + '">' + job.source + '</span>' +
        '</div>' +
        '<p class="text-xs text-slate-500 mb-1 font-medium">' + job.hospital + '</p>' +
        '<h2 class="text-base font-black text-slate-800 mb-3 leading-tight">' + titleStr + '</h2>' +
        '<div class="bg-emerald-50 p-3 rounded-2xl mb-3">' +
          '<p class="text-[9px] text-emerald-600 font-bold mb-1">薪資</p>' +
          '<p class="text-lg font-black text-emerald-700 tracking-tighter">' + (job.salary || '面議') + '</p>' +
        '</div>' +
        '<p class="text-[10px] text-slate-400 mb-4"><i class="fa-solid fa-location-dot mr-1"></i>' + (job.location || job.city || '') + '　<i class="fa-solid fa-calendar ml-2 mr-1"></i>' + dateStr + '</p>' +
      '</div>' +
      '<a href="' + job.link + '" target="_blank" class="block text-center bg-slate-900 text-white font-bold py-3 rounded-2xl hover:bg-blue-600 transition text-sm">查看詳情 →</a>' +
    '</div>';
  }).join('');
}

loadJobs();
</script>
</body>
</html>
